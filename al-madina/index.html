<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>AL-MADINA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }

    #loading-screen {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      transition: opacity 0.6s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    #loading-title {
      font-size: 3rem; font-weight: 800; letter-spacing: 0.3em;
      text-transform: uppercase; margin-bottom: 2rem;
      background: linear-gradient(90deg, #667eea, #764ba2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #loading-bar-container {
      width: min(80%, 400px); height: 6px;
      background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;
    }
    #loading-bar {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 3px; transition: width 0.3s ease;
    }
    #loading-text {
      margin-top: 1rem; font-size: 0.85rem; color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
    }

    #touch-jump {
      display: none; position: fixed; bottom: 30px; right: 30px; z-index: 100;
      width: 70px; height: 70px; border-radius: 50%;
      background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
      color: #fff; font-size: 1.2rem; font-weight: bold;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      touch-action: manipulation; user-select: none;
      display: none; align-items: center; justify-content: center;
    }
    #touch-jump:active { background: rgba(255,255,255,0.3); }

    #joystick-zone {
      display: none; position: fixed; bottom: 0; left: 0;
      width: 50%; height: 40%; z-index: 100;
    }

    #debug-info {
      display: none; position: fixed; top: 10px; left: 10px; z-index: 100;
      font-family: monospace; font-size: 12px; color: #0f0;
      background: rgba(0,0,0,0.5); padding: 8px; border-radius: 4px;
      pointer-events: none;
    }

    #mode-indicator {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff; background: rgba(0,0,0,0.5);
      padding: 6px 14px; border-radius: 20px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      pointer-events: none; user-select: none;
      transition: background 0.3s ease;
    }
    #mode-indicator.camera-mode {
      background: rgba(102, 126, 234, 0.6);
    }
    #mode-indicator .hint {
      display: block; font-size: 0.6rem; font-weight: 400;
      opacity: 0.6; margin-top: 2px; letter-spacing: 0.05em;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-docuhewa.js"></script>
</head>
<body>
  <div id="loading-screen">
    <div id="loading-title">AL-MADINA</div>
    <div id="loading-bar-container"><div id="loading-bar"></div></div>
    <div id="loading-text">Initializing...</div>
  </div>
  <div id="joystick-zone"></div>
  <button id="touch-jump">Jump</button>
  <div id="debug-info"></div>
  <div id="mode-indicator">CHARACTER MODE<span class="hint">TAB to toggle</span></div>
</body>
</html>
